<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E2D1A" />
      <stop offset="50%" stop-color="#144A29" />
      <stop offset="100%" stop-color="#091E11" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <linearGradient id="roofGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Rounded App Icon Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" />
  
  <!-- Glowing Sun / Digital Horizon -->
  <circle cx="256" cy="200" r="76" fill="url(#sunGrad)" filter="url(#glow)" opacity="0.9" />
  <circle cx="256" cy="200" r="64" fill="url(#sunGrad)" />

  <!-- Digital Leaf & Sprout Canopy -->
  <path d="M160 330 C 130 250, 160 170, 256 120 C 352 170, 382 250, 352 330 Z" fill="url(#leafGrad)" opacity="0.25" />
  <path d="M190 330 C 170 270, 190 200, 256 160 C 322 200, 342 270, 322 330 Z" fill="url(#leafGrad)" opacity="0.4" />

  <!-- Modern Village Home Architecture -->
  <path d="M256 170 L360 260 L340 260 L340 370 L172 370 L172 260 L152 260 Z" fill="#FFFFFF" />
  <path d="M256 160 L376 264 L350 264 L256 182 L162 264 L136 264 Z" fill="url(#roofGrad)" filter="url(#glow)" />
  <path d="M256 160 L376 264 L350 264 L256 182 L162 264 L136 264 Z" fill="url(#roofGrad)" />
  
  <!-- Home Door & Digital Connectivity Waves -->
  <rect x="232" y="290" width="48" height="80" rx="24" fill="#0E2D1A" />
  <circle cx="266" cy="330" r="4" fill="#34D399" />

  <!-- Subtle Digital Circuit Nodes around Base -->
  <circle cx="160" cy="400" r="8" fill="#34D399" />
  <path d="M168 400 L216 400" stroke="#34D399" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  <circle cx="224" cy="400" r="6" fill="#FBBF24" />
  <circle cx="352" cy="400" r="8" fill="#34D399" />
  <path d="M344 400 L296 400" stroke="#34D399" stroke-width="4" stroke-linecap="round" opacity="0.6" />
  <circle cx="288" cy="400" r="6" fill="#FBBF24" />
</svg>
